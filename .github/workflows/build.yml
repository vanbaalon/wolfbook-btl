name: Build native addon

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: win32-x64

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build native addon
        run: npx node-gyp rebuild

      - name: Build TypeScript
        run: npx tsc -p tsconfig.json

      - name: Smoke test
        run: node tester/ci_smoke.js

      - name: Upload native addon
        uses: actions/upload-artifact@v4
        with:
          name: wolfbook_btl-${{ matrix.platform }}
          path: build/Release/wolfbook_btl.node
          retention-days: 90

  collect:
    name: Collect prebuilds
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organise into prebuilds/
        run: |
          mkdir -p prebuilds
          for dir in artifacts/wolfbook_btl-*; do
            platform="${dir##*wolfbook_btl-}"
            cp "$dir/wolfbook_btl.node" "prebuilds/wolfbook_btl-${platform}.node"
          done
          ls -lh prebuilds/

      - name: Commit prebuilds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prebuilds/
          if git diff --cached --quiet; then
            echo "No changes to prebuilds"
          else
            git commit -m "ci: update prebuilt binaries [skip ci]"
            git push
          fi
